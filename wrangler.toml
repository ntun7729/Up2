name = "up2-vless-worker"
main = "src/main.js"
compatibility_date = "2026-05-16"

[observability]
enabled = true

[vars]
PROXY_POLICY = "direct-first"
PROXY_FAIL_COOLDOWN_MS = "120000"
DOH_STRATEGY = "race"
DNS_CACHE_TTL_SECONDS = "60"
DNS_TCP_FALLBACK = "true"
CONNECT_TIMEOUT_MS = "6000"
DNS_TIMEOUT_MS = "5000"
ENABLE_LOGS = "false"
